name: Build Amethyst

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install pkg
        run: npm install -g pkg

      - name: Build EXE
        run: |
          pkg . --targets node22-win-x64 --output Amethyst.exe

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Amethyst-Windows
          path: Amethyst.exe
