name: Build Amethyst

on:
  push:
    branches:
      - mainsadasfdsfsgdfdv
    paths:
      - "package.json"
      - "src/**"
      - "public/**"
      - "build/**"
      - "tauri-ui/**"
      - "test/**"
      - "exewarning.txt"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Install fork of pkg
        run: npm install -g @yao-pkg/pkg

      - name: Build EXE
        run: |
          pkg . --targets node20-win-x64 --output Amethyst.exe

      - name: Create version
        id: version
        shell: bash
        run: |
          VERSION="v1.0.${GITHUB_RUN_NUMBER}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Git tag
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Amethyst ${{ steps.version.outputs.version }}
          files: |
            Amethyst.exe
            exewarning.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
